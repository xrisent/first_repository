    <!-- Команды -->
    <!-- ls - показывает какие папки находятся в этом месте -->
    <!-- cd - переходит в какую либо папку -->

    <!-- git команды -->
    <!-- git init - инициализирует пустой git репозиторий -->
    <!-- git status - посмотреть статус нашего репозитория -->
    <!-- git add <название файла> - начинает отслеживать файл/файлы -->

    <!-- git log - показывает историю коммитов -->

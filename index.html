<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Git</h1>
    <h2>Привет</h2>
    <!-- Git - система контроля версий -->
    <!-- позволяет вам делать сохранения вашего проекта на каком либо этапе -->
    <!-- Команды -->
    <!-- ls - показывает какие папки находятся в этом месте -->
    <!-- cd - переходит в какую либо папку -->
    <!-- clear - очистить терминал -->
    <!-- ctrl + c - сбрасывает текущее состояние строки (отменяет действие) -->

    <!-- git команды -->
    <!-- git init - инициализирует пустой git репозиторий -->
    <!-- git status - посмотреть статус нашего репозитория -->
    <!-- git add <название файла> - начинает отслеживать файл/файлы -->
    <!-- git commit -m 'first commit' - сохраняет все отслеживаемые файлы под каким то коммитом -->
    <!-- git log - показывает историю коммитов -->
    <!-- git restore <название файла> - возвращает файл к сохраненному состоянию -->
    <!-- git restore --staged <название файла> - убирает файл из промежуточного состояния -->

    <!-- git remote add origin <url> - сохраняет в origin ссылку на наш удаленный репозиторий -->
    <!-- git remote remove <название> (обычно origin) - убирает из origin ссылку, чтобы мы могли снова написать add origin -->
    <!-- git clone <ссылка на репозиторий> - клонирует проект из GitHub -->
    <!-- git push origin <название ветки> - отправляет наши изменения в удаленный репозиторий -->
    <!-- git pull origin <название ветки> - стягивает новые изменения из удаленного репозитория -->
    <!-- git branch - выводит список веток -->
    <!-- git branch <название ветки> - создает новую ветку под названием -->
    <!-- git checkout <название ветки> - переходит на указанную ветку -->
    <!-- git checkout -b <название ветки> - переходит на новую ветку -->
  </body>
</html>
